<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beepex Cuyo — Catálogo Mayorista</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0e0f14;--surface:#16181f;--card:#1c1f2a;--border:#2a2d3a;--accent:#4a7cff;--accent2:#f5a623;--green:#22c55e;--red:#ef4444;--preventa:#a78bfa;--text:#f0f2ff;--muted:#8b90a8;--tag-bg:#1e2130;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
  .header{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;padding:10px 16px;}
  .header-inner{display:flex;align-items:center;gap:12px;max-width:960px;margin:0 auto;}
  .logo-icon{width:44px;height:44px;background:linear-gradient(135deg,#7c6af7,#4a7cff);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
  .logo-text h1{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;line-height:1.1;}
  .logo-text p{font-size:11px;color:var(--muted);}
  .header-actions{margin-left:auto;display:flex;align-items:center;gap:8px;}
  .iva-toggle{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 14px;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;white-space:nowrap;user-select:none;}
  .iva-toggle .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:background .2s;}
  .iva-toggle.active .dot{background:var(--green);}
  .iva-toggle.active{border-color:var(--green);color:var(--green);}
  .cart-btn{background:var(--accent);color:#fff;border:none;border-radius:20px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .2s;white-space:nowrap;}
  .cart-btn:hover{background:#3a6cf0;}
  .cart-count{background:var(--accent2);color:#000;border-radius:50%;width:20px;height:20px;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;min-width:20px;}
  .toolbar{max-width:960px;margin:0 auto;padding:14px 16px 0;display:flex;flex-direction:column;gap:10px;}
  .search-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px;color:var(--text);font-family:inherit;outline:none;transition:border .2s;}
  .search-input::placeholder{color:var(--muted);}
  .search-input:focus{border-color:var(--accent);}
  .filters{display:flex;gap:8px;flex-wrap:wrap;}
  .filter-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .2s;}
  .filter-btn.active,.filter-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff;}
  .filter-btn.f-stock.active,.filter-btn.f-stock:hover{background:var(--green);border-color:var(--green);color:#fff;}
  .filter-btn.f-preventa.active,.filter-btn.f-preventa:hover{background:var(--preventa);border-color:var(--preventa);color:#fff;}
  .filter-btn.f-nostock.active,.filter-btn.f-nostock:hover{background:var(--red);border-color:var(--red);color:#fff;}
  .filter-sep{width:1px;background:var(--border);margin:0 2px;align-self:stretch;}
  .product-count{font-size:12px;color:var(--muted);}
  .grid{max-width:960px;margin:0 auto;padding:14px 16px 140px;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .grid>.card,.grid>.section-title{order:9999;}
  @media(min-width:600px){.grid{grid-template-columns:repeat(3,1fr);}}
  @media(min-width:900px){.grid{grid-template-columns:repeat(4,1fr);}}
  .section-title{grid-column:1/-1;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:8px 0 0;}
  .section-title.hidden{display:none;}
  .no-results{grid-column:1/-1;text-align:center;color:var(--muted);padding:60px 0;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;transition:transform .15s,border-color .15s,opacity .15s;}
  .card.hidden{opacity:0;pointer-events:none;height:0;min-height:0;padding:0;margin:0;border:none;overflow:hidden;}
  .card:hover{transform:translateY(-2px);border-color:#3a3f55;}
  .card.in-cart{border-color:var(--accent);}
  .card.is-preventa{border-color:rgba(167,139,250,.3);}
  .card.is-preventa.in-cart{border-color:var(--preventa);}
  .card.is-nostock{opacity:.55;}
  .card-img{width:100%;aspect-ratio:1;background:var(--tag-bg);position:relative;overflow:hidden;will-change:transform;transform:translateZ(0);}
  .card-img img{width:100%;height:100%;object-fit:cover;display:none;}
  .card-img img.visible{display:block;}
  .card-img .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:32px;color:var(--border);}
  .preventa-banner{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(109,40,217,.85),transparent);color:#fff;font-size:10px;font-weight:700;padding:16px 8px 6px;text-align:center;letter-spacing:.5px;}
  .card-body{padding:10px;flex:1;display:flex;flex-direction:column;gap:4px;}
  .tags{display:flex;gap:4px;flex-wrap:wrap;}
  .tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;background:var(--tag-bg);}
  .tag.brand-beepaw{color:#a0aaff;}
  .tag.brand-gen{color:#f9a8d4;}
  .tag.t-stock{color:var(--green);}
  .tag.t-nostock{color:var(--red);}
  .tag.t-preventa{color:var(--preventa);background:rgba(167,139,250,.12);}
  .iva-label{font-size:10px;color:var(--muted);margin-top:2px;}
  .prod-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;line-height:1.2;margin-top:2px;}
  .sku{font-size:10px;color:var(--muted);}
  .price{font-size:18px;font-weight:700;margin-top:4px;}
  .price-note{font-size:10px;color:var(--muted);margin-top:1px;}
  .pvp{font-size:11px;color:var(--muted);}
  .pvp span{color:var(--accent2);font-weight:600;}
  .qty-row{display:flex;align-items:center;gap:6px;margin-top:8px;}
  .qty-btn{background:var(--tag-bg);border:none;border-radius:7px;width:28px;height:28px;color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0;}
  .qty-btn:hover{background:var(--accent);}
  .card.is-preventa .qty-btn:hover{background:var(--preventa);}
  .qty-val{font-size:14px;font-weight:600;min-width:22px;text-align:center;}
  .add-btn{flex:1;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:12px;font-weight:700;padding:7px 4px;cursor:pointer;transition:all .15s;font-family:inherit;}

  .add-btn.btn-preventa:hover{background:#8b5cf6;}
  .add-btn:disabled{background:var(--tag-bg);color:var(--muted);cursor:not-allowed;}

  .add-btn.in-cart-btn{background:transparent;border:1.5px solid var(--accent);color:var(--accent);}
  .add-btn.in-cart-btn:hover{background:var(--accent);color:#fff;}
  .add-btn.in-cart-btn.btn-preventa{border-color:var(--preventa);color:var(--preventa);}
  .add-btn.in-cart-btn.btn-preventa:hover{background:var(--preventa);color:#fff;}
  /* Cart */
  .cart-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;}
  .cart-overlay.open{display:block;}
  .cart-drawer{position:fixed;right:0;top:0;bottom:0;width:min(440px,100%);background:var(--surface);border-left:1px solid var(--border);z-index:201;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease;}

  .cart-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .cart-header h2{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;flex:1;}
  .close-btn{background:var(--card);border:none;border-radius:8px;width:32px;height:32px;color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .cart-items{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px;}
  .cart-empty{text-align:center;color:var(--muted);margin-top:60px;font-size:14px;line-height:2.2;}
  .cart-section-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:4px 0 2px;}

  .cart-item-info{flex:1;min-width:0;}

  .cart-item-price{font-size:12px;color:var(--accent2);font-weight:600;margin-top:2px;}
  .cart-item-badge{font-size:9px;font-weight:700;color:var(--preventa);margin-top:1px;}
  .cart-item-qty{display:flex;align-items:center;gap:4px;margin-top:4px;}

  .cart-item-qty span{font-size:12px;font-weight:600;min-width:18px;text-align:center;}
  .cart-remove{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:4px;flex-shrink:0;}
  .cart-remove:hover{color:var(--red);}
  .cart-footer{border-top:1px solid var(--border);padding:14px 16px;display:flex;flex-direction:column;gap:10px;flex-shrink:0;}
  .cart-input{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--text);font-family:inherit;outline:none;transition:border .2s;width:100%;}
  .cart-input:focus{border-color:var(--accent);}
  .cart-input::placeholder{color:var(--muted);}
  .cart-iva-row{display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:600;}
  .toggle-switch{position:relative;width:40px;height:22px;flex-shrink:0;}
  .toggle-switch input{opacity:0;width:0;height:0;}
  .toggle-slider{position:absolute;inset:0;background:var(--tag-bg);border-radius:22px;cursor:pointer;transition:background .2s;}
  .toggle-slider:before{content:'';position:absolute;width:16px;height:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:transform .2s;}
  .toggle-switch input:checked+.toggle-slider{background:var(--green);}
  .toggle-switch input:checked+.toggle-slider:before{transform:translateX(18px);}
  .totals{background:var(--card);border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:4px;}
  .total-row{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);}
  .total-row.big{color:var(--text);font-weight:700;font-size:16px;margin-top:6px;padding-top:6px;border-top:1px solid var(--border);}
  .wa-btn{background:#25d366;border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;padding:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .2s;font-family:inherit;}
  .wa-btn:hover{background:#1db954;}
  .wa-btn:disabled{background:var(--tag-bg);color:var(--muted);cursor:not-allowed;}
  /* Toast de persistencia */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#22c55e;color:#fff;font-size:13px;font-weight:600;padding:10px 20px;border-radius:20px;z-index:300;transition:transform .3s ease;pointer-events:none;}
  .toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>

<script>
// ── Configuración ────────────────────────────────────────────────────────────
const GITHUB_USER='fmz-mza', GITHUB_REPO='Beepexcuyo', GITHUB_BRANCH='main';
const EXTENSIONS=['jpg','jpeg','png','webp','JPG','PNG'];
const WA_NUMBER='5492616220850';

// ── Cache de imágenes ────────────────────────────────────────────────────────
const imgCache = {}; // sku → url exitosa | 'error'
function imgBase(sku){ return `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${GITHUB_BRANCH}/images/SKU_${sku}`; }
function tryLoadImg(el, sku, i=0){
  if(imgCache[sku]==='error') return;
  if(imgCache[sku]){ el.src=imgCache[sku]; el.onload=()=>onImgLoaded(el); return; }
  if(i>=EXTENSIONS.length){ imgCache[sku]='error'; return; }
  el.onerror=()=>tryLoadImg(el,sku,i+1);
  el.onload=()=>{ imgCache[sku]=el.src; onImgLoaded(el); };
  el.src=`${imgBase(sku)}.${EXTENSIONS[i]}`;
}
function onImgLoaded(el){
  el.classList.add('visible');
  el.parentElement.querySelector('.ph')?.remove();
}

// ── Lazy loading con IntersectionObserver ────────────────────────────────────
const imgObserver = new IntersectionObserver((entries)=>{
  entries.forEach(e=>{
    if(!e.isIntersecting) return;
    const el=e.target, sku=el.dataset.sku;
    if(sku && !el.src) tryLoadImg(el, sku);
    imgObserver.unobserve(el);
  });
}, { rootMargin:'200px' });

// ── Helpers de stock ─────────────────────────────────────────────────────────
function stockType(s){
  if(!s||s==='NOSTOCK') return 'NOSTOCK';
  if(s==='STOCK') return 'STOCK';
  if(s.toUpperCase().includes('PREVENTA')) return 'PREVENTA';
  return 'NOSTOCK';
}
function stockLabel(s){
  const t=stockType(s);
  if(t==='STOCK') return 'EN STOCK';
  if(t==='PREVENTA') return s;
  return 'SIN STOCK';
}

// ── Mapa rápido de productos por SKU ─────────────────────────────────────────
const productMap = Object.fromEntries(products.map(p=>[p.sku, p]));

// ── Estado ────────────────────────────────────────────────────────────────────
let cart={}, includeIVA=false, activeBrand='ALL', activeStock='ALL';
let renderTimer=null;
// Último listado filtrado renderizado
let lastRenderedSkus = [];

const fmt = n => '$'+Math.round(n).toLocaleString('es-AR').replace(/,/g,'.');
const mayorista = p => includeIVA ? Math.round(p.price*(1+p.iva/100)) : p.price;

// ── Persistencia ──────────────────────────────────────────────────────────────
function saveCart(){
  try {
    sessionStorage.setItem('beepex_cart', JSON.stringify({
      cart, includeIVA,
      clientName: document.getElementById('clientName').value,
      clientObs:  document.getElementById('clientObs').value
    }));
  } catch(e){}
}
function loadCart(){
  try {
    const raw = sessionStorage.getItem('beepex_cart');
    if(!raw) return;
    const data = JSON.parse(raw);
    cart = data.cart || {};
    Object.keys(cart).forEach(sku=>{
      const p=productMap[sku];
      if(p) cart[sku].product=p; else delete cart[sku];
    });
    if(data.clientName) document.getElementById('clientName').value=data.clientName;
    if(data.clientObs)  document.getElementById('clientObs').value=data.clientObs;
    if(data.includeIVA) syncIVA(true);
    const n=Object.values(cart).reduce((a,c)=>a+c.qty,0);
    if(n>0) showToast(`🛒 Pedido restaurado (${n} productos)`);
  } catch(e){ sessionStorage.removeItem('beepex_cart'); }
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// ── IVA ───────────────────────────────────────────────────────────────────────
function toggleIVA(){ syncIVA(!includeIVA); }
function syncIVA(v){
  includeIVA=v;
  document.getElementById('ivaToggleHeader').classList.toggle('active',v);
  document.getElementById('ivaLabel').textContent=v?'Con IVA':'Sin IVA';
  document.getElementById('ivaCheck').checked=v;
  saveCart();
  // Al cambiar IVA solo hay que actualizar precios en cards existentes, no recrearlas
  patchPrices();
  renderCart();
}

// ── Patch de precios: actualiza solo texto de precio sin recrear DOM ──────────
function patchPrices(){
  lastRenderedSkus.forEach(sku=>{
    const p=productMap[sku]; if(!p) return;
    const priceEl=document.querySelector(`#card-${sku} .price`);
    const noteEl=document.querySelector(`#card-${sku} .price-note`);
    if(priceEl) priceEl.textContent=fmt(mayorista(p));
    if(noteEl) noteEl.textContent=includeIVA?'Precio c/IVA incluido':'Precio s/IVA';
  });
  document.getElementById('productCount').textContent=
    `${lastRenderedSkus.length} producto${lastRenderedSkus.length!==1?'s':''} · Precio mayorista ${includeIVA?'con':'sin'} IVA`;
}

// ── Filtros ───────────────────────────────────────────────────────────────────
function renderBrands(){
  const brands=['ALL',...new Set(products.map(p=>p.brand).filter(Boolean))];
  let html=brands.map(b=>`<button class="filter-btn ${b===activeBrand?'active':''}" onclick="setBrand('${b}')">${b==='ALL'?'🐾 Todos':b}</button>`).join('');
  html+=`<div class="filter-sep"></div>`;
  html+=`<button class="filter-btn f-stock ${activeStock==='STOCK'?'active':''}" onclick="setStock('STOCK')">✅ En stock</button>`;
  html+=`<button class="filter-btn f-preventa ${activeStock==='PREVENTA'?'active':''}" onclick="setStock('PREVENTA')">🕐 Preventa</button>`;
  html+=`<button class="filter-btn f-nostock ${activeStock==='NOSTOCK'?'active':''}" onclick="setStock('NOSTOCK')">❌ Sin stock</button>`;
  document.getElementById('brandFilters').innerHTML=html;
}
function setBrand(b){ activeBrand=b; renderBrands(); renderGrid(); }
function setStock(s){ activeStock=activeStock===s?'ALL':s; renderBrands(); renderGrid(); }

// ── Debounce para el buscador ─────────────────────────────────────────────────
function scheduleRender(){
  clearTimeout(renderTimer);
  renderTimer=setTimeout(renderGrid, 200);
}

// ── Grid: DOM diferencial — show/hide + CSS order, nunca destruye nodos ────
function renderGrid(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const list=products.filter(p=>{
    const okBrand=activeBrand==='ALL'||p.brand===activeBrand;
    const okQ=!q||p.name.toLowerCase().includes(q)||String(p.sku).includes(q)||(p.brand||'').toLowerCase().includes(q);
    const okStock=activeStock==='ALL'||stockType(p.stock)===activeStock;
    return okBrand&&okQ&&okStock;
  });

  lastRenderedSkus=list.map(p=>p.sku);
  const grid=document.getElementById('grid');
  document.getElementById('productCount').textContent=
    `${list.length} producto${list.length!==1?'s':''} · Precio mayorista ${includeIVA?'con':'sin'} IVA`;

  if(!list.length){
    // Ocultar todo en lugar de destruir
    grid.querySelectorAll('.card').forEach(el=>el.classList.add('hidden'));
    grid.querySelectorAll('.section-title').forEach(el=>el.classList.add('hidden'));
    let noRes=grid.querySelector('.no-results');
    if(!noRes){ noRes=document.createElement('div'); noRes.className='no-results'; noRes.textContent='😿 No se encontraron productos'; grid.appendChild(noRes); }
    noRes.classList.remove('hidden');
    return;
  }

  // Ocultar mensaje de sin resultados si existe
  const noRes=grid.querySelector('.no-results');
  if(noRes) noRes.classList.add('hidden');

  const visibleSkus=new Set(list.map(p=>p.sku));
  const groups={};
  list.forEach((p,i)=>{ const k=p.brand||'Sin marca'; (groups[k]=groups[k]||[]).push({p,i}); });
  const keys=Object.keys(groups);
  const showTitles=keys.length>1||activeBrand==='ALL';

  // Ocultar todos los títulos primero
  grid.querySelectorAll('.section-title').forEach(el=>el.classList.add('hidden'));

  // Calcular el orden de cada item: título de marca justo antes de sus cards
  let orderIdx=0;
  keys.forEach(brand=>{
    // Section title
    let titleEl=grid.querySelector(`.section-title[data-brand="${brand}"]`);
    if(!titleEl){
      titleEl=document.createElement('div');
      titleEl.className='section-title';
      titleEl.dataset.brand=brand;
      titleEl.textContent=`📦 ${brand}`;
      grid.appendChild(titleEl);
    }
    if(showTitles) titleEl.classList.remove('hidden'); else titleEl.classList.add('hidden');
    titleEl.style.order=orderIdx++;

    groups[brand].forEach(({p})=>{
      // Card: crear si no existe, parchear si existe
      let cardEl=document.getElementById(`card-${p.sku}`);
      if(!cardEl){
        cardEl=createCard(p);
        grid.appendChild(cardEl);
      }
      // Mostrar/ocultar con clase hidden — sin display:none que causa parpadeo
      if(visibleSkus.has(p.sku)) cardEl.classList.remove('hidden');
      else cardEl.classList.add('hidden');
      cardEl.style.order=orderIdx++;
    });
  });

  // Ocultar cards de productos que no están en ningún grupo visible
  grid.querySelectorAll('.card[id^="card-"]').forEach(el=>{
    const sku=el.id.replace('card-','');
    if(!visibleSkus.has(sku)) el.classList.add('hidden');
  });
}

// Crear una card nueva completa
function createCard(p){
  const qty=cart[p.sku]?.qty||0;
  const precio=mayorista(p);
  const st=stockType(p.stock);
  const isPrev=st==='PREVENTA', isNoStock=st==='NOSTOCK';
  const brandClass=p.brand==='BEEPAW'?'brand-beepaw':'brand-gen';
  const tagClass=st==='STOCK'?'t-stock':st==='PREVENTA'?'t-preventa':'t-nostock';
  const div=document.createElement('div');
  div.id=`card-${p.sku}`;
  div.className=`card${qty>0?' in-cart':''}${isPrev?' is-preventa':''}${isNoStock?' is-nostock':''}`;
  div.innerHTML=`
    <div class="card-img">
      <img id="img-${p.sku}" data-sku="${p.sku}" alt="${p.name}">
      <div class="ph">📷</div>
      ${isPrev?`<div class="preventa-banner">🕐 ${p.stock.toUpperCase()}</div>`:''}
    </div>
    <div class="card-body">
      <div class="tags">
        <span class="tag ${brandClass}">${p.brand}</span>
        <span class="tag ${tagClass}">${stockLabel(p.stock)}</span>
      </div>
      <div class="iva-label">IVA ${p.iva}%</div>
      <div class="prod-name">${p.name}</div>
      <div class="sku">SKU: ${p.sku}</div>
      <div class="price">${fmt(precio)}</div>
      <div class="price-note">${includeIVA?'Precio c/IVA incluido':'Precio s/IVA'}</div>
      ${p.pvp>0?`<div class="pvp">PVP sugerido <span>${fmt(p.pvp)}</span></div>`:''}
      <div class="qty-row">
        <button class="qty-btn" onclick="chg('${p.sku}',-1)">−</button>
        <span class="qty-val">${qty}</span>
        <button class="qty-btn" onclick="chg('${p.sku}',1)">+</button>
        <button class="${qty>0?(isPrev?'add-btn btn-preventa in-cart-btn':'add-btn in-cart-btn'):(isPrev?'add-btn btn-preventa':'add-btn')}"
          onclick="add('${p.sku}')" ${isNoStock?'disabled':''}>
          ${qty>0?`✓ En pedido (${qty})`:'+ Agregar'}
        </button>
      </div>
    </div>`;
  // Registrar imagen para lazy load
  const imgEl=div.querySelector(`#img-${p.sku}`);
  if(imgEl) imgObserver.observe(imgEl);
  return div;
}

// Patch de card existente: solo escribe en el DOM si el valor realmente cambió
function patchCard(cardEl, p){
  const qty=cart[p.sku]?.qty||0;
  const precio=fmt(mayorista(p));
  const st=stockType(p.stock);
  const isPrev=st==='PREVENTA', isNoStock=st==='NOSTOCK';

  // Clase in-cart: solo tocar si cambió
  const shouldInCart=qty>0;
  if(cardEl.classList.contains('in-cart')!==shouldInCart)
    cardEl.classList.toggle('in-cart', shouldInCart);

  // Cantidad
  const qtyVal=cardEl.querySelector('.qty-val');
  if(qtyVal && qtyVal.textContent!=qty) qtyVal.textContent=qty;

  // Precio
  const priceEl=cardEl.querySelector('.price');
  if(priceEl && priceEl.textContent!==precio) priceEl.textContent=precio;

  // Nota precio
  const nota=includeIVA?'Precio c/IVA incluido':'Precio s/IVA';
  const noteEl=cardEl.querySelector('.price-note');
  if(noteEl && noteEl.textContent!==nota) noteEl.textContent=nota;

  // Botón: calcular nuevo estado
  const btn=cardEl.querySelector('.add-btn');
  if(btn){
    const newClass=`${isPrev?'add-btn btn-preventa':'add-btn'}${qty>0?' in-cart-btn':''}`;
    const newText=qty>0?`✓ En pedido (${qty})`:'+ Agregar';
    if(btn.className!==newClass) btn.className=newClass;
    if(btn.textContent!==newText) btn.textContent=newText;
    if(btn.disabled!==isNoStock) btn.disabled=isNoStock;
  }
}

// reorderGrid eliminado — el orden se maneja con CSS order en renderGrid

// ── Operaciones de carrito ────────────────────────────────────────────────────
function add(sku){
  const p=productMap[sku];
  if(!p||stockType(p.stock)==='NOSTOCK') return;
  cart[sku]={product:p, qty:(cart[sku]?.qty||0)+1};
  syncCart(sku);
}
function chg(sku,d){
  const p=productMap[sku]; if(!p) return;
  const q=(cart[sku]?.qty||0)+d;
  if(q<=0) delete cart[sku]; else cart[sku]={product:p,qty:q};
  syncCart(sku);
}

// syncCart: parchea SOLO la card del SKU modificado, sin tocar el resto
function syncCart(sku){
  saveCart();
  updateCount();
  // Solo actualizar la card específica que cambió
  if(sku){
    const cardEl=document.getElementById(`card-${sku}`);
    const p=productMap[sku];
    if(cardEl&&p) patchCard(cardEl,p);
  }
  renderCart();
}

function updateCount(){ document.getElementById('cartCount').textContent=Object.values(cart).reduce((a,c)=>a+c.qty,0); }
function openCart(){ document.getElementById('cartOverlay').classList.add('open'); document.getElementById('cartDrawer').classList.add('open'); renderCart(); }
function closeCart(){ document.getElementById('cartOverlay').classList.remove('open'); document.getElementById('cartDrawer').classList.remove('open'); }

function renderCart(){
  const items=Object.values(cart).filter(c=>c.qty>0);
  const box=document.getElementById('cartItems');
  if(!items.length){
    box.innerHTML='<div class="cart-empty">🛒<br>El pedido está vacío<br><small>Agregá productos desde el catálogo</small></div>';
    document.getElementById('totals').innerHTML='';
    document.getElementById('waBtn').disabled=true;
    return;
  }
  document.getElementById('waBtn').disabled=false;
  const groups={};
  items.forEach(c=>{ const b=c.product.brand||'Sin marca'; (groups[b]=groups[b]||[]).push(c); });
  let html='';
  Object.entries(groups).forEach(([brand,list])=>{
    html+=`<div class="cart-section-label">📦 ${brand}</div>`;
    list.forEach(c=>{
      const p=c.product, precio=mayorista(p);
      const isPrev=stockType(p.stock)==='PREVENTA';
      html+=`
      <div class="cart-item ${isPrev?'ci-preventa':''}">
        <div class="cart-item-img"><img id="ci-${p.sku}" alt="${p.name}"><span id="cp-${p.sku}">📦</span></div>
        <div class="cart-item-info">
          <div class="cart-item-name">${p.name}</div>
          <div class="cart-item-sku">SKU ${p.sku}</div>
          <div class="cart-item-price">${fmt(precio)} × ${c.qty} = ${fmt(precio*c.qty)}</div>
          ${isPrev?`<div class="cart-item-badge">🕐 ${p.stock}</div>`:''}
          <div class="cart-item-qty">
            <button onclick="chg('${p.sku}',-1)">−</button>
            <span>${c.qty}</span>
            <button onclick="chg('${p.sku}',1)">+</button>
          </div>
        </div>
        <button class="cart-remove" onclick="chg('${p.sku}',${-c.qty})">🗑</button>
      </div>`;
    });
  });
  box.innerHTML=html;
  items.forEach(c=>{
    const el=document.getElementById(`ci-${c.product.sku}`); if(!el) return;
    const cached=imgCache[c.product.sku];
    if(cached&&cached!=='error'){
      el.src=cached; el.onload=()=>{ el.classList.add('visible'); document.getElementById(`cp-${c.product.sku}`)?.remove(); };
    } else {
      tryLoadImg(el, c.product.sku);
    }
  });
  let sub=0, ivaTot=0;
  items.forEach(c=>{ sub+=c.product.price*c.qty; ivaTot+=Math.round(c.product.price*c.qty*c.product.iva/100); });
  const total=includeIVA?sub+ivaTot:sub;
  const totalU=items.reduce((a,c)=>a+c.qty,0);
  const hasPrev=items.some(c=>stockType(c.product.stock)==='PREVENTA');
  document.getElementById('totals').innerHTML=`
    <div class="total-row"><span>Subtotal s/IVA</span><span>${fmt(sub)}</span></div>
    ${includeIVA?`<div class="total-row"><span>IVA (por producto)</span><span>+ ${fmt(ivaTot)}</span></div>`:''}
    <div class="total-row big"><span>TOTAL (${totalU} prod.)</span><span>${fmt(total)}</span></div>
    ${hasPrev?`<div class="total-row" style="color:var(--preventa);font-size:11px;margin-top:6px">🕐 Incluye productos en preventa</div>`:''}`;
}

// ── WhatsApp ──────────────────────────────────────────────────────────────────
function sendWhatsApp(){
  const name=document.getElementById('clientName').value.trim()||'Sin nombre';
  const obs=document.getElementById('clientObs').value.trim();
  const today=new Date().toLocaleDateString('es-AR');
  const items=Object.values(cart).filter(c=>c.qty>0);
  if(!items.length) return;
  const groups={};
  items.forEach(c=>{ const b=c.product.brand||'Sin marca'; (groups[b]=groups[b]||[]).push(c); });
  let sub=0, ivaTot=0;
  items.forEach(c=>{ sub+=c.product.price*c.qty; ivaTot+=Math.round(c.product.price*c.qty*c.product.iva/100); });
  const total=includeIVA?sub+ivaTot:sub;
  const totalU=items.reduce((a,c)=>a+c.qty,0);
  const hasPrev=items.some(c=>stockType(c.product.stock)==='PREVENTA');
  let msg=`🐾 *PEDIDO BEEPEX CUYO*\n━━━━━━━━━━━━━━━━━━\n`;
  msg+=`👤 *Cliente:* ${name}\n📅 *Fecha:* ${today}\n💰 *Precios:* ${includeIVA?'Con IVA':'Sin IVA'}\n━━━━━━━━━━━━━━━━━━\n\n`;
  Object.entries(groups).forEach(([brand,list])=>{
    msg+=`📦 *${brand}*\n`;
    list.forEach(c=>{
      const precio=mayorista(c.product);
      const isPrev=stockType(c.product.stock)==='PREVENTA';
      msg+=`• ${c.product.name} (SKU ${c.product.sku})${isPrev?' 🕐 '+c.product.stock:''}\n`;
      msg+=`  Cant: ${c.qty} × ${fmt(precio)} = *${fmt(precio*c.qty)}*\n`;
    });
    msg+='\n';
  });
  msg+=`━━━━━━━━━━━━━━━━━━\n📊 *Subtotal s/IVA:* ${fmt(sub)}\n`;
  if(includeIVA) msg+=`💳 *IVA:* + ${fmt(ivaTot)}\n`;
  msg+=`✅ *TOTAL (${totalU} productos):* *${fmt(total)}*`;
  if(hasPrev) msg+=`\n🕐 *Incluye productos en preventa*`;
  if(obs) msg+=`\n\n💬 *Obs:* ${obs}`;
  window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`,'_blank');
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadCart();
renderBrands();
renderGrid();
</script>
